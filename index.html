<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheather App</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js"></script>
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button><img src="./search.png" class="search-icon"></button>
        </div>
        <div class="wheater">
            <img src="./cloud.png" class="weather-icon">
            <h1 class="temp">22°C</h1>
            <h2 class="city">New York</h2><br><br>
            <div class="details">
                <div class="col">
                    <img src="./humidity.png" class="humidity-img">
                    <div>
                        <p>Humidity</p>
                        <h1>50%</h1><br><br>
                    </div>
                </div>
                <div class="col">
                    <img src="./storm.png" class="wind-img">
                    <div>
                        <p>Wind Speed</p>
                        <h1>10 km/h</h1>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
